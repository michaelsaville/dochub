<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DocHub</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 380px;
      min-height: 200px;
      background: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
    }
    .header-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 14px;
    }
    .header-logo {
      width: 22px;
      height: 22px;
      background: #3b82f6;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 13px;
    }
    .header-domain {
      font-size: 11px;
      color: #64748b;
    }
    .setup-section {
      padding: 16px;
    }
    .label {
      font-size: 11px;
      color: #94a3b8;
      margin-bottom: 4px;
    }
    .input {
      width: 100%;
      padding: 7px 10px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 12px;
      margin-bottom: 8px;
      outline: none;
    }
    .input:focus { border-color: #3b82f6; }
    .btn {
      width: 100%;
      padding: 8px;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    .btn:hover { background: #2563eb; }
    .btn-sm {
      padding: 4px 10px;
      font-size: 11px;
      background: #1e293b;
      color: #94a3b8;
      border: 1px solid #334155;
      border-radius: 5px;
      cursor: pointer;
    }
    .btn-sm:hover { background: #334155; color: #e2e8f0; }
    .btn-copy {
      padding: 3px 8px;
      font-size: 10px;
      background: transparent;
      color: #64748b;
      border: 1px solid #334155;
      border-radius: 4px;
      cursor: pointer;
    }
    .btn-copy:hover { color: #e2e8f0; border-color: #64748b; }
    .search-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
    }
    .search-input {
      flex: 1;
      padding: 6px 10px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 13px;
      outline: none;
    }
    .search-input:focus { border-color: #3b82f6; }
    .results {
      max-height: 400px;
      overflow-y: auto;
    }
    .empty {
      padding: 24px;
      text-align: center;
      color: #64748b;
      font-size: 12px;
    }
    .cred-item {
      padding: 10px 14px;
      border-bottom: 1px solid #1e293b;
      cursor: default;
    }
    .cred-item:hover { background: #1e293b; }
    .cred-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .cred-label { font-weight: 500; font-size: 13px; }
    .cred-client { font-size: 10px; color: #64748b; }
    .cred-username { font-size: 11px; color: #94a3b8; margin-bottom: 6px; }
    .cred-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .secret-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
    }
    .secret-val {
      font-family: monospace;
      font-size: 12px;
      background: #0f172a;
      padding: 2px 8px;
      border-radius: 4px;
      color: #e2e8f0;
      flex: 1;
      word-break: break-all;
    }
    .totp-code {
      font-family: monospace;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.1em;
    }
    .totp-timer { font-size: 10px; color: #64748b; }
    .status-bar {
      padding: 4px 14px;
      font-size: 10px;
      color: #64748b;
      background: #0a0f1a;
      border-top: 1px solid #1e293b;
      display: flex;
      justify-content: space-between;
    }
    .tag-autofill {
      font-size: 9px;
      background: #1d4ed8;
      color: #bfdbfe;
      padding: 1px 5px;
      border-radius: 3px;
    }
    .tag-notes {
      font-size: 9px;
      background: #854d0e;
      color: #fde68a;
      padding: 1px 5px;
      border-radius: 3px;
    }
    .cred-notes {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 4px;
      padding: 4px 8px;
      background: #0f172a;
      border-radius: 4px;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 60px;
      overflow-y: auto;
    }
    .gen-section {
      padding: 10px 14px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
    }
    .gen-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .gen-output {
      flex: 1;
      font-family: monospace;
      font-size: 12px;
      padding: 5px 8px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 5px;
      color: #e2e8f0;
      cursor: text;
      user-select: all;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .gen-opts {
      display: flex;
      gap: 8px;
      margin-top: 6px;
      align-items: center;
    }
    .gen-opts label {
      font-size: 10px;
      color: #94a3b8;
      display: flex;
      align-items: center;
      gap: 3px;
      cursor: pointer;
    }
    .gen-opts input[type="range"] {
      width: 60px;
      accent-color: #3b82f6;
    }
    .gen-opts input[type="checkbox"] {
      accent-color: #3b82f6;
    }
    .btn-fill {
      padding: 3px 8px;
      font-size: 10px;
      background: #166534;
      color: #bbf7d0;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .btn-fill:hover { background: #15803d; }
    #toast {
      display: none;
      position: fixed;
      top: 10px;
      right: 10px;
      background: #166534;
      color: #fff;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 11px;
      z-index: 999;
    }
  </style>
</head>
<body>
  <div id="toast"></div>
  <div id="app"></div>
  <script src="popup.js"></script>
</body>
</html>
