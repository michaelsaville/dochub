services:
  app:
    image: ghcr.io/michaelsaville/dochub:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    volumes:
      - uploads:/uploads
      - ./backups/platform:/app/data/backups
    depends_on:
      - db
      - clamav

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Antivirus for uploaded files. The app streams each upload to clamd over
  # TCP (INSTREAM) on clamav:3310 before accepting it — see lib/files/clamav.ts.
  # Signature DB persists in clamav_data; first boot downloads it (a few min,
  # during which scans fail-open as "skipped" unless CLAMAV_REQUIRED=true).
  clamav:
    image: clamav/clamav:latest
    restart: unless-stopped
    volumes:
      - clamav_data:/var/lib/clamav

  # Watchtower removed 2026-05-29 — it was a non-functional zombie on this host
  # (containerd image store + DOCKER_API_VERSION pin; the poll loop never ran,
  # even after a clean restart). Deploys are now explicit and reliable:
  #   ./deploy.sh   (after CI finishes building a pushed commit)
  # deploy.sh self-heals GHCR auth from the gh CLI token, so an expired docker
  # credential can't silently break deploys again.

volumes:
  postgres_data:
  uploads:
  clamav_data:
