services:
  app:
    image: ghcr.io/michaelsaville/dochub:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      # Real DATABASE_URL comes from .env; this line is only here as a
      # minimal override target. Keep it REPLACE_ME so a public-repo reader
      # doesn't see a credential-shaped string, fake or not.
      - DATABASE_URL=postgresql://REPLACE_ME@db:5432/REPLACE_ME
    volumes:
      - uploads:/uploads
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/msaville/.docker/config.json:/root/.docker/config.json:ro
    environment:
      - DOCKER_API_VERSION=1.41
    command: --interval 30 --cleanup

volumes:
  postgres_data:
  uploads:
