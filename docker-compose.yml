services:
  app:
    image: ghcr.io/michaelsaville/dochub:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    volumes:
      - uploads:/uploads
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Watchtower removed 2026-05-29 — it was a non-functional zombie on this host
  # (containerd image store + DOCKER_API_VERSION pin; the poll loop never ran,
  # even after a clean restart). Deploys are now explicit and reliable:
  #   ./deploy.sh   (after CI finishes building a pushed commit)
  # deploy.sh self-heals GHCR auth from the gh CLI token, so an expired docker
  # credential can't silently break deploys again.

volumes:
  postgres_data:
  uploads:
